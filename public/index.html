<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Organizer</title>
<style>
  :root{
    --bg:#15171B;
    --surface:#1E2126;
    --ink:#ECEDEE;
    --muted:#8B92A0;
    --border:#2C3038;
    --accent:#2FA98A;
    --accent-soft:#16332C;
    --overdue:#E0824B;
    --overdue-soft:#3A2417;
    --btn-bg:#2C3038;
    --btn-text:#ECEDEE;
    --font-display: -apple-system, 'Segoe UI', system-ui, sans-serif;
    --font-body: -apple-system, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:32px 20px 100px;
  }
  header{
    margin-bottom:16px;
  }
  .header-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }
  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:24px;
    letter-spacing:-0.02em;
    margin:0 0 4px;
  }
  .sub{
    color:var(--muted);
    font-size:14px;
    font-family:var(--font-mono);
  }
  .toggle-btn{
    flex-shrink:0;
    width:38px;
    height:38px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--ink);
    font-size:20px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .2s ease, background .15s ease;
  }
  .toggle-btn.open{
    background:var(--btn-bg);
    color:var(--btn-text);
    transform:rotate(45deg);
  }

  .tab-bar{
    display:flex;
    gap:8px;
    margin-bottom:20px;
    border-bottom:1px solid var(--border);
  }
  .tab-btn{
    flex:1;
    background:none;
    border:none;
    color:var(--muted);
    font-family:var(--font-display);
    font-weight:600;
    font-size:14px;
    padding:10px 4px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:color .15s ease, border-color .15s ease;
  }
  .tab-btn.active{
    color:var(--ink);
    border-bottom-color:var(--accent);
  }
  .view{display:block;}

  .chip-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .chip{
    background:var(--bg);
    border:1px solid var(--border);
    color:var(--muted);
    font-family:var(--font-mono);
    font-size:12px;
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .chip.selected{
    background:var(--accent-soft);
    border-color:var(--accent);
    color:var(--ink);
  }

  .sets-editor{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .set-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .set-label{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--muted);
    width:44px;
    flex-shrink:0;
  }
  .set-row input[type="number"]{
    flex:1;
    min-width:0;
    font-family:var(--font-mono);
    font-size:14px;
    border:1px solid var(--border);
    border-radius:9px;
    padding:9px 10px;
    background:var(--bg);
    color:var(--ink);
    outline:none;
    color-scheme:dark;
  }
  .set-row input:focus{border-color:var(--accent);}
  .remove-set-btn{
    flex-shrink:0;
    background:none;
    border:none;
    color:var(--muted);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:4px 6px;
    border-radius:6px;
  }
  .remove-set-btn:hover{color:var(--overdue);background:var(--overdue-soft);}
  .add-set-btn{
    align-self:flex-start;
    background:none;
    border:1px dashed var(--border);
    color:var(--muted);
    font-family:var(--font-mono);
    font-size:12px;
    padding:8px 14px;
    border-radius:9px;
    cursor:pointer;
  }
  .add-set-btn:hover{border-color:var(--accent);color:var(--ink);}

  .sub-tab-bar{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .sub-tab-btn{
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--muted);
    font-family:var(--font-display);
    font-weight:600;
    font-size:13px;
    padding:8px 16px;
    border-radius:9px;
    cursor:pointer;
  }
  .sub-tab-btn.active{
    background:var(--accent-soft);
    border-color:var(--accent);
    color:var(--ink);
  }

  .ex-date-group{margin-bottom:22px;}
  .ex-date-label{
    font-family:var(--font-mono);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .ex-date-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--border);
  }
  .ex-entry{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:8px;
  }
  .ex-entry-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:6px;
  }
  .ex-name{
    font-size:15px;
    font-weight:600;
  }
  .ex-muscle-tag{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
  }
  .ex-sets-summary{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
    word-break:break-word;
  }

  .trend-select{
    width:100%;
    font-family:var(--font-body);
    font-size:15px;
    border:1px solid var(--border);
    border-radius:9px;
    padding:10px 12px;
    background:var(--bg);
    color:var(--ink);
    outline:none;
    margin-bottom:20px;
    color-scheme:dark;
  }
  .trend-block{margin-bottom:24px;}
  .trend-title{
    font-family:var(--font-mono);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin-bottom:8px;
  }
  .trend-chart-wrap{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
  }
  .trend-chart{
    width:100%;
    height:auto;
    display:block;
  }
  .next-up-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    margin-bottom:20px;
  }
  .next-up-label{
    font-family:var(--font-mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin-bottom:8px;
  }
  .next-up-main{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  .next-up-name{
    font-size:18px;
    font-weight:700;
    font-family:var(--font-display);
  }
  .next-up-muscle{
    font-family:var(--font-mono);
    font-size:12px;
  }
  .next-up-use-btn{
    background:var(--btn-bg);
    color:var(--btn-text);
    border:none;
    border-radius:9px;
    padding:8px 14px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    flex-shrink:0;
  }
  .next-up-then{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--muted);
  }
  .next-up-complete{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--accent);
  }
  .trend-empty, .empty{
    text-align:center;
    color:var(--muted);
    font-family:var(--font-mono);
    font-size:13px;
    padding:40px 0;
  }

  #foodAddRow, #burnAddRow{
    max-height:none;
    overflow:visible;
  }
  .mini-header{
    font-family:var(--font-mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
  }

  .summary-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    margin-bottom:20px;
  }
  .summary-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .summary-date{
    font-family:var(--font-display);
    font-weight:700;
    font-size:16px;
  }
  .target-edit{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--muted);
    flex-wrap:wrap;
  }
  .target-edit input[type="number"]{
    width:64px;
    font-family:var(--font-mono);
    font-size:13px;
    border:1px solid var(--border);
    border-radius:7px;
    padding:6px 8px;
    background:var(--bg);
    color:var(--ink);
    outline:none;
  }
  .target-edit button{
    background:var(--btn-bg);
    color:var(--btn-text);
    border:none;
    border-radius:7px;
    padding:6px 10px;
    font-size:12px;
    font-family:var(--font-display);
    font-weight:600;
    cursor:pointer;
  }
  .summary-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
    margin-bottom:12px;
  }
  .summary-stat-label{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:2px;
  }
  .summary-stat-value{
    font-family:var(--font-display);
    font-weight:700;
    font-size:20px;
  }
  .summary-deficit-row{
    border-top:1px solid var(--border);
    padding-top:12px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .deficit-good{color:var(--accent);}
  .surplus-bad{color:var(--overdue);}

  .chip.meal{}

  .cal-item{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:8px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }
  .cal-item-main{flex:1;min-width:0;}
  .cal-item-name{font-size:15px;font-weight:600;}
  .cal-item-sub{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--muted);
    margin-top:3px;
  }
  .cal-item-cals{
    font-family:var(--font-mono);
    font-size:15px;
    font-weight:600;
    flex-shrink:0;
    white-space:nowrap;
  }

  .week-table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:16px;
    font-size:13px;
  }
  .week-table th, .week-table td{
    text-align:right;
    padding:8px 6px;
    border-bottom:1px solid var(--border);
    font-family:var(--font-mono);
    white-space:nowrap;
  }
  .week-table th:first-child, .week-table td:first-child{
    text-align:left;
  }
  .week-table th{
    color:var(--muted);
    font-weight:600;
    font-size:11px;
    text-transform:uppercase;
  }
  .week-table tfoot td{
    font-weight:700;
    border-bottom:none;
    border-top:1px solid var(--border);
  }
  .week-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .week-nav button{
    background:var(--btn-bg);
    color:var(--btn-text);
    border:none;
    border-radius:9px;
    padding:8px 14px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .week-nav-label{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--muted);
  }
  .week-estimate{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    font-size:14px;
  }
  .week-estimate .big{
    font-family:var(--font-display);
    font-weight:700;
    font-size:20px;
  }
  .week-estimate .caveat{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
    margin-top:4px;
  }

  @media (max-width: 420px){
    .summary-grid{grid-template-columns:1fr 1fr;}
    .week-table{font-size:11.5px;}
  }
  .add-row{
    display:flex;
    flex-direction:column;
    gap:10px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
    margin-bottom:24px;
    overflow:hidden;
    max-height:200px;
    opacity:1;
    transition:max-height .25s ease, opacity .2s ease, padding .25s ease, margin .25s ease;
  }
  .add-row.collapsed{
    max-height:0;
    opacity:0;
    padding-top:0;
    padding-bottom:0;
    margin-bottom:8px;
    border-width:0;
  }
  #exAddRow{
    max-height:none;
    overflow:visible;
  }
  .add-row .fields{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .color-row{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .swatch{
    width:24px;
    height:24px;
    border-radius:50%;
    border:1.5px solid transparent;
    cursor:pointer;
    padding:0;
    box-sizing:border-box;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .swatch:hover{transform:scale(1.1);}
  .swatch.selected{
    box-shadow:0 0 0 2px var(--surface), 0 0 0 4px var(--ink);
  }
  input[type="text"], input[type="date"]{
    font-family:var(--font-body);
    font-size:15px;
    border:1px solid var(--border);
    border-radius:9px;
    padding:10px 12px;
    background:var(--bg);
    color:var(--ink);
    outline:none;
    color-scheme:dark;
  }
  input[type="text"]{flex:1;}
  input[type="date"]{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--muted);
    width:132px;
  }
  input[type="time"]{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--muted);
    width:100px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:9px;
    padding:10px 12px;
    outline:none;
    color-scheme:dark;
  }
  input[type="number"]{
    font-family:var(--font-mono);
    font-size:14px;
    color:var(--ink);
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:9px;
    padding:10px 12px;
    outline:none;
    color-scheme:dark;
    width:100%;
    min-width:0;
  }
  input[type="number"]:focus{border-color:var(--accent);}
  #foodQtyInput, #foodCalInput, #burnCalInput{
    flex:1;
    min-width:70px;
  }
  input:focus{border-color:var(--accent);}
  button.add-btn{
    background:var(--btn-bg);
    color:var(--btn-text);
    border:none;
    border-radius:9px;
    padding:10px 16px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:background .15s ease;
  }
  button.add-btn:hover{background:var(--accent);}

  .group{margin-bottom:26px;}
  .group-label{
    font-family:var(--font-mono);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .group-label.overdue{color:var(--overdue);}
  .group-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--border);
  }

  .task{
    display:flex;
    align-items:flex-start;
    gap:12px;
    background:var(--surface);
    border:1px solid var(--border);
    border-left:4px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:8px;
    transition:opacity .2s ease, transform .2s ease;
  }
  .task.done{opacity:0.5;}

  .check{
    flex-shrink:0;
    width:22px;
    height:22px;
    border-radius:7px;
    border:2px solid var(--border);
    background:var(--bg);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:1px;
    transition:border-color .15s ease, background .15s ease;
  }
  .check svg{
    width:13px;
    height:13px;
    opacity:0;
    transition:opacity .15s ease;
  }
  .task.done .check{
    background:var(--accent);
    border-color:var(--accent);
  }
  .task.done .check svg{opacity:1;}

  .task-body{flex:1;min-width:0;}
  .task-text{
    font-size:15px;
    line-height:1.4;
    word-break:break-word;
  }
  .task.done .task-text{
    text-decoration:line-through;
    text-decoration-color:var(--muted);
  }
  .task-date{
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--muted);
    margin-top:3px;
  }
  .task.overdue-item .task-date{color:var(--overdue);}

  .del{
    flex-shrink:0;
    background:none;
    border:none;
    color:var(--muted);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:2px 4px;
    border-radius:6px;
    transition:color .15s ease, background .15s ease;
  }
  .del:hover{color:var(--overdue);background:var(--overdue-soft);}

  .edit-btn{
    flex-shrink:0;
    background:none;
    border:none;
    color:var(--muted);
    font-size:14px;
    line-height:1;
    cursor:pointer;
    padding:4px;
    border-radius:6px;
    transition:color .15s ease, background .15s ease;
  }
  .edit-btn:hover{color:var(--ink);background:var(--accent-soft);}

  .edit-form{
    display:flex;
    flex-direction:column;
    gap:10px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    margin-bottom:8px;
  }
  .edit-form input[type="text"]{
    width:100%;
  }
  .edit-form .fields{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .edit-form .actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
  }
  .edit-form .save-btn{
    background:var(--btn-bg);
    color:var(--btn-text);
    border:none;
    border-radius:9px;
    padding:8px 14px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .edit-form .save-btn:hover{background:var(--accent);}
  .edit-form .cancel-btn{
    background:none;
    border:1px solid var(--border);
    color:var(--muted);
    border-radius:9px;
    padding:8px 14px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }

  .empty{
    text-align:center;
    color:var(--muted);
    font-family:var(--font-mono);
    font-size:13px;
    padding:40px 0;
  }
  .status{
    text-align:center;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
    margin-top:24px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-row">
      <div>
        <h1>Life Organizer</h1>
      </div>
      <button class="toggle-btn" id="toggleBtn" aria-label="Toggle add task form">+</button>
    </div>
  </header>

  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="tasks" id="tabTasksBtn">Tasks</button>
    <button class="tab-btn" data-tab="exercise" id="tabExerciseBtn">Exercise</button>
    <button class="tab-btn" data-tab="calories" id="tabCaloriesBtn">Calories</button>
  </div>

  <div class="view" id="tasksView">
    <div class="add-row" id="addRow">
      <input type="text" id="taskInput" placeholder="Add a task…" />
      <div class="color-row" id="colorRow">

        <button type="button" class="swatch" data-color="#8A4FBF" style="background:#8A4FBF;" aria-label="Purple"></button>
        <button type="button" class="swatch" data-color="#C4437B" style="background:#C4437B;" aria-label="Pink"></button>
        <button type="button" class="swatch" data-color="#D4A017" style="background:#D4A017;" aria-label="Yellow"></button>
        <button type="button" class="swatch" data-color="#D9731F" style="background:#D9731F;" aria-label="Orange"></button>
        <button type="button" class="swatch" data-color="#C0392B" style="background:#C0392B;" aria-label="Red"></button>

        <datalist id="burnTypes"></datalist>

          <input type="number" step="1" min="0" id="burnCalInput" placeholder="Calories" />

<script>
let tasks = [];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

async function load(){
  try{
    const res = await fetch('/api/tasks');
    if(!res.ok) throw new Error('Request failed: ' + res.status);
    const data = await res.json();
    tasks = Array.isArray(data.tasks) ? data.tasks : [];
  }catch(e){
    tasks = [];
    console.error('Load failed:', e);
  }
  render();
}

async function save(){
  try{
    const res = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tasks })
    });
    if(!res.ok) throw new Error('Request failed: ' + res.status);
  }catch(e){
    console.error('Save failed:', e);
  }
}

let selectedColor = '';

function addTask(){
  const input = document.getElementById('taskInput');
  const dateInput = document.getElementById('dateInput');
  const timeInput = document.getElementById('timeInput');
  const text = input.value.trim();
  if(!text) return;
  tasks.push({
    id: uid(),
    text,
    date: dateInput.value || null,
    time: timeInput.value || null,
    color: selectedColor || null,
    done: false,
    created: Date.now()
  });
  input.value = '';
  timeInput.value = '';
  selectedColor = '';
  colorRow.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  colorRow.querySelector('.swatch[data-color=""]').classList.add('selected');
  save();
  render();
}

function startEdit(id){
  editingId = id;
  render();
  // wire up swatch selection for the edit form now that it's in the DOM
  const row = document.getElementById('editColorRow-' + id);
  if(row){
    row.addEventListener('click', (e) => {
      const btn = e.target.closest('.swatch');
      if(!btn) return;
      row.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      btn.classList.add('selected');
      row.dataset.selected = btn.dataset.editColor || '';
    });
  }
}

function cancelEdit(){
  editingId = null;
  render();
}

function saveEdit(id){
  const t = tasks.find(t=>t.id===id);
  if(!t) return;
  const textEl = document.getElementById('editText-' + id);
  const dateEl = document.getElementById('editDate-' + id);
  const timeEl = document.getElementById('editTime-' + id);
  const colorRow = document.getElementById('editColorRow-' + id);
  const newText = textEl.value.trim();
  if(!newText) return;
  t.text = newText;
  t.date = dateEl.value || null;
  t.time = timeEl.value || null;
  const selectedSwatch = colorRow ? colorRow.querySelector('.swatch.selected') : null;
  t.color = selectedSwatch ? (selectedSwatch.dataset.editColor || null) : t.color;
  editingId = null;
  save();
  render();
}

function toggleTask(id){
  const t = tasks.find(t=>t.id===id);
  if(t){ t.done = !t.done; save(); render(); }
}

function deleteTask(id){
  tasks = tasks.filter(t=>t.id!==id);
  save();
  render();
}

function fmtDate(dateStr){
  if(!dateStr) return null;
  return dateStr.replaceAll('-', '/');
}

function fmtTime(timeStr){
  if(!timeStr) return null;
  return timeStr;
}

let editingId = null;

function render(){
  const listsEl = document.getElementById('lists');
  if(tasks.length === 0){
    listsEl.innerHTML = '<div class="empty">no tasks yet — add one above</div>';
    return;
  }

  const today = todayStr();
  const pending = tasks.filter(t=>!t.done);
  const done = tasks.filter(t=>t.done).sort((a,b)=>((a.date||'9999/99/99')+' '+(a.time||'')).localeCompare((b.date||'9999/99/99')+' '+(b.time||'')));

  function sortKey(t){
    return (t.date || '9999/99/99') + ' ' + (t.time || '');
  }
  const overdue = pending.filter(t=>t.date && t.date < today).sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));
  const todayTasks = pending.filter(t=>t.date === today).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const upcoming = pending.filter(t=>t.date && t.date > today).sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));
  const noDate = pending.filter(t=>!t.date).sort((a,b)=>(a.time||'').localeCompare(b.time||'') || a.created-b.created);

  let html = '';

  function group(label, items, cls){
    if(items.length === 0) return '';
    let rows = items.map(t => t.id === editingId ? editForm(t) : taskRow(t)).join('');
    return `<div class="group"><div class="group-label ${cls||''}">${label}</div>${rows}</div>`;
  }

  function contrastText(hex){
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
    return luminance > 0.6 ? '#1D2126' : '#FFFFFF';
  }

  const swatchColors = [
    {c:'', label:'No colour'},
    {c:'#1F6F5C', label:'Green'},
    {c:'#2D5FA6', label:'Blue'},
    {c:'#8A4FBF', label:'Purple'},
    {c:'#C4437B', label:'Pink'},
    {c:'#D4A017', label:'Yellow'},
    {c:'#D9731F', label:'Orange'},
    {c:'#C0392B', label:'Red'},
    {c:'#B3541E', label:'Rust'}
  ];

  function editForm(t){
    const swatchesHtml = swatchColors.map(sw => {
      const isSelected = (t.color || '') === sw.c;
      const bg = sw.c || 'transparent';
      const border = sw.c ? '' : 'border:1.5px dashed var(--border);';
      return `<button type="button" class="swatch ${isSelected?'selected':''}" data-edit-color="${sw.c}" style="background:${bg};${border}" aria-label="${sw.label}"></button>`;
    }).join('');
    return `
      <div class="edit-form" id="editForm-${t.id}">
        <input type="text" id="editText-${t.id}" value="${escapeAttr(t.text)}" />
        <div class="color-row" id="editColorRow-${t.id}" data-task-id="${t.id}">${swatchesHtml}</div>
        <div class="fields">
          <input type="date" id="editDate-${t.id}" value="${t.date || ''}" />
          <input type="time" id="editTime-${t.id}" step="300" value="${t.time || ''}" />
        </div>
        <div class="actions">
          <button type="button" class="cancel-btn" onclick="cancelEdit()">Cancel</button>
          <button type="button" class="save-btn" onclick="saveEdit('${t.id}')">Save</button>
        </div>
      </div>`;
  }

  function taskRow(t){
    const overdueFlag = t.date && t.date < today && !t.done;
    let colorStyle = '';
    let mutedStyle = '';
    if(t.color){
      const textColor = contrastText(t.color);
      colorStyle = `style="background:${t.color};border-color:${t.color};color:${textColor};"`;
      mutedStyle = `style="color:${textColor};opacity:0.75;"`;
    }
    return `
      <div class="task ${t.done?'done':''} ${overdueFlag?'overdue-item':''} ${t.color?'coloured':''}" ${colorStyle}>
        <div class="check" onclick="toggleTask('${t.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="task-body">
          <div class="task-text">${escapeHtml(t.text)}</div>
          ${t.date ? `<div class="task-date" ${mutedStyle}>${fmtDate(t.date)}${t.time ? ' · ' + fmtTime(t.time) : ''}</div>` : ''}
        </div>
        <button class="edit-btn" onclick="startEdit('${t.id}')" ${t.color ? `style="color:${contrastText(t.color)};"` : ''} aria-label="Edit">✎</button>
        <button class="del" onclick="deleteTask('${t.id}')" ${t.color ? `style="color:${contrastText(t.color)};"` : ''}>×</button>
      </div>`;
  }

  html += group('Overdue', overdue, 'overdue');
  html += group('Today', todayTasks);
  html += group('Upcoming', upcoming);
  html += group('No date', noDate);
  html += group('Done', done);

  listsEl.innerHTML = html;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str){
  return escapeHtml(str).replaceAll('"', '&quot;');
}

document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') addTask();
});
document.getElementById('dateInput').value = todayStr();

const addRow = document.getElementById('addRow');
const toggleBtn = document.getElementById('toggleBtn');
toggleBtn.addEventListener('click', () => {
  addRow.classList.toggle('collapsed');
  const isOpen = !addRow.classList.contains('collapsed');
  toggleBtn.classList.toggle('open', isOpen);
  if(isOpen) setTimeout(() => document.getElementById('taskInput').focus(), 200);
});
// start collapsed so the task list fills the screen
addRow.classList.add('collapsed');

const colorRow = document.getElementById('colorRow');
colorRow.addEventListener('click', (e) => {
  const btn = e.target.closest('.swatch');
  if(!btn) return;
  colorRow.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  btn.classList.add('selected');
  selectedColor = btn.dataset.color || '';
});

load();

/* ================= EXERCISE TRACKER ================= */

const MUSCLE_GROUPS = ['Chest','Shoulders','Biceps','Triceps','Abs','Trapezius','Chest/Shoulders'];
const MUSCLE_COLORS = {
  'Chest': '#2D5FA6',
  'Shoulders': '#8A4FBF',
  'Biceps': '#1F6F5C',
  'Triceps': '#D9731F',
  'Abs': '#C0392B',
  'Trapezius': '#D4A017',
  'Chest/Shoulders': '#C4437B'
};

function contrastTextGlobal(hex){
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
  return luminance > 0.6 ? '#1D2126' : '#FFFFFF';
}

// Fixed routine order, taken from the spreadsheet — cycles through in this
// exact sequence every workout session.
const ROUTINE = [
  {ex:'Dumbbell press', m:'Chest'},
  {ex:'Lateral raise', m:'Shoulders'},
  {ex:'Bicep curl (close)', m:'Biceps'},
  {ex:'Lying Tricep Extension', m:'Triceps'},
  {ex:'Various Abs Exercises', m:'Abs'},
  {ex:'Overhead press', m:'Shoulders'},
  {ex:'Chest flyers', m:'Chest'},
  {ex:'Cross body hammer curl', m:'Biceps'},
  {ex:'Overhead raises', m:'Triceps'},
  {ex:'Various Abs Exercises', m:'Abs'},
  {ex:'Inclined dumbbell press', m:'Chest'},
  {ex:'Lateral raise', m:'Shoulders'},
  {ex:'Concentration curl', m:'Biceps'},
  {ex:'Upright row', m:'Shoulders'},
  {ex:'Various Abs Exercises', m:'Abs'},
  {ex:'Front overhead press', m:'Shoulders'},
  {ex:'Bicep curl (45 degree)', m:'Biceps'},
  {ex:'Middle press', m:'Chest'},
  {ex:'Hammer curl', m:'Biceps'},
  {ex:'Various Abs Exercises', m:'Abs'},
  {ex:'Lower raises', m:'Chest'},
  {ex:'Crush curl', m:'Biceps'},
  {ex:'Tricep dumbbell kickback', m:'Triceps'},
  {ex:'Push ups', m:'Chest/Shoulders'},
  {ex:'Various Abs Exercises', m:'Abs'},
  {ex:'Dumbbell shrugs', m:'Trapezius'},
  {ex:'Rear delt flys', m:'Shoulders'},
  {ex:'Limp wrist bicep curls', m:'Biceps'}
];
const SEED_EXERCISES = [
  'Dumbbell press','Lateral raise','Bicep curl (close)','Lying Tricep Extension',
  'Overhead press','Chest flyers','Cross body hammer curl','Overhead raises',
  'Inclined dumbbell press','Concentration curl','Upright row','Front overhead press',
  'Bicep curl (45 degree)','Middle press','Hammer curl','Lower raises','Crush curl',
  'Tricep dumbbell kickback','Push ups','Dumbbell shrugs','Rear delt flys',
  'Limp wrist bicep curls'
];

let exerciseLogs = [];
let currentSets = [{weight:'', reps:''}];
let selectedMuscle = '';
let activeSubtab = 'history';

function exUid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function loadExercise(){
  try{
    const res = await fetch('/api/exercise');
    if(!res.ok) throw new Error('Request failed: ' + res.status);
    const data = await res.json();
    exerciseLogs = Array.isArray(data.logs) ? data.logs : [];
  }catch(e){
    exerciseLogs = [];
    console.error('Exercise load failed:', e);
  }
  renderExerciseNames();
  renderHistory();
  renderTrendSelect();
  renderNextUp();
}

async function saveExercise(){
  try{
    const res = await fetch('/api/exercise', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ logs: exerciseLogs })
    });
    if(!res.ok) throw new Error('Request failed: ' + res.status);
  }catch(e){
    console.error('Exercise save failed:', e);
  }
}

function renderExerciseNames(){
  const names = new Set(SEED_EXERCISES);
  exerciseLogs.forEach(l => names.add(l.exercise));
  const dl = document.getElementById('exerciseNames');
  dl.innerHTML = Array.from(names).sort((a,b)=>a.localeCompare(b))
    .map(n => `<option value="${escapeAttr(n)}"></option>`).join('');
}

function renderMuscleChips(){
  const row = document.getElementById('muscleChipRow');
  row.innerHTML = MUSCLE_GROUPS.map(m => {
    const color = MUSCLE_COLORS[m] || '#6B7280';
    const isSel = selectedMuscle === m;
    const style = isSel
      ? `background:${color};border-color:${color};color:${contrastTextGlobal(color)};`
      : `background:transparent;border-color:${color};color:${color};`;
    return `<button type="button" class="chip ${isSel?'selected':''}" data-muscle="${escapeAttr(m)}" style="${style}">${escapeHtml(m)}</button>`;
  }).join('');
}

function renderSetsEditor(){
  const el = document.getElementById('setsEditor');
  el.innerHTML = currentSets.map((s,i) => `
    <div class="set-row">
      <span class="set-label">Set ${i+1}</span>
      <input type="number" step="0.5" min="0" class="set-weight" data-i="${i}" placeholder="kg" value="${s.weight}" />
      <input type="number" step="1" min="0" class="set-reps" data-i="${i}" placeholder="reps" value="${s.reps}" />
      <button type="button" class="remove-set-btn" data-i="${i}" aria-label="Remove set">×</button>
    </div>
  `).join('');
}

function findLastLogFor(name){
  const norm = name.trim().toLowerCase();
  if(!norm) return null;
  const matches = exerciseLogs.filter(l => l.exercise.trim().toLowerCase() === norm);
  if(matches.length === 0) return null;
  return matches.slice().sort((a,b)=> (a.date+'\u0000'+a.created) < (b.date+'\u0000'+b.created) ? 1 : -1)[0];
}

function addExerciseLog(){
  const nameInput = document.getElementById('exNameInput');
  const dateInput = document.getElementById('exDateInput');
  const name = nameInput.value.trim();
  if(!name) return;
  const cleanSets = currentSets
    .map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps, 10) }))
    .filter(s => !isNaN(s.weight) && !isNaN(s.reps));
  if(cleanSets.length === 0) return;

  exerciseLogs.push({
    id: exUid(),
    date: dateInput.value || todayStr(),
    exercise: name,
    muscleGroup: selectedMuscle || null,
    sets: cleanSets,
    created: Date.now()
  });

  nameInput.value = '';
  selectedMuscle = '';
  currentSets = [{weight:'', reps:''}];
  renderMuscleChips();
  renderSetsEditor();
  saveExercise();
  renderExerciseNames();
  renderHistory();
  renderTrendSelect();
  renderNextUp();
}

function deleteExerciseLog(id){
  exerciseLogs = exerciseLogs.filter(l => l.id !== id);
  saveExercise();
  renderHistory();
  renderTrendSelect();
  renderNextUp();
}

function fmtSets(sets){
  return sets.map(s => `${s.weight}kg×${s.reps}`).join(', ');
}

function computeNextUp(){
  const today = todayStr();
  const todaysLogs = exerciseLogs
    .filter(l => l.date === today)
    .slice()
    .sort((a,b)=> a.created - b.created);

  let pointer = 0;
  todaysLogs.forEach(log => {
    const norm = log.exercise.trim().toLowerCase();
    for(let i = pointer; i < ROUTINE.length; i++){
      if(ROUTINE[i].ex.trim().toLowerCase() === norm){
        pointer = i + 1;
        break;
      }
    }
  });

  if(pointer >= ROUTINE.length){
    return { done: true };
  }
  return {
    done: false,
    next: ROUTINE[pointer],
    upcoming: ROUTINE.slice(pointer + 1, pointer + 3)
  };
}

function useNextUp(exName, muscle){
  document.getElementById('tabExerciseBtn').click();
  const nameInput = document.getElementById('exNameInput');
  nameInput.value = exName;
  const match = findLastLogFor(exName);
  if(match){
    currentSets = match.sets.map(s => ({weight: String(s.weight), reps: String(s.reps)}));
    selectedMuscle = match.muscleGroup || muscle || '';
  } else {
    selectedMuscle = muscle || '';
    currentSets = [{weight:'', reps:''}];
  }
  renderMuscleChips();
  renderSetsEditor();
  nameInput.scrollIntoView({behavior:'smooth', block:'center'});
}

function renderNextUp(){
  const el = document.getElementById('nextUpCard');
  const result = computeNextUp();
  if(result.done){
    el.innerHTML = `
      <div class="next-up-card">
        <div class="next-up-label">Coming up next</div>
        <div class="next-up-complete">🎉 All exercises done for today — nice work</div>
      </div>`;
    return;
  }
  const color = MUSCLE_COLORS[result.next.m] || 'var(--muted)';
  const thenNames = result.upcoming.map(u => u.ex).join(', ');
  el.innerHTML = `
    <div class="next-up-card">
      <div class="next-up-label">Coming up next</div>
      <div class="next-up-main">
        <div>
          <div class="next-up-name">${escapeHtml(result.next.ex)}</div>
          <div class="next-up-muscle" style="color:${color};">${escapeHtml(result.next.m)}</div>
        </div>
        <button type="button" class="next-up-use-btn" data-next-ex="${escapeAttr(result.next.ex)}" data-next-muscle="${escapeAttr(result.next.m)}">Log this</button>
      </div>
      ${thenNames ? `<div class="next-up-then">then: ${escapeHtml(thenNames)}</div>` : ''}
    </div>`;
}

function renderHistory(){
  const el = document.getElementById('exHistory');
  if(exerciseLogs.length === 0){

function lineChartSVG(points, unitLabel){
  const w = 320, h = 110, padX = 8, padY = 16;
  if(points.length === 0){
    return '<div class="trend-empty">Not enough data yet</div>';
  }
  if(points.length === 1){
    return `<div class="trend-empty">Only one session logged (${points[0].y}${unitLabel}) — add more to see a trend</div>`;
  }
  const ys = points.map(p=>p.y);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const range = (maxY - minY) || 1;
  const stepX = (w - 2*padX) / (points.length - 1);
  const coords = points.map((p,i) => {
    const x = padX + i*stepX;
    const y = h - padY - ((p.y - minY)/range) * (h - 2*padY);
    return [x, y];
  });
  const path = coords.map((c,i)=> (i===0?'M':'L') + c[0].toFixed(1) + ',' + c[1].toFixed(1)).join(' ');
  const dots = coords.map(c => `<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="3.5" style="fill:var(--accent);" />`).join('');
  const firstLabel = points[0].y + unitLabel;
  const lastLabel = points[points.length-1].y + unitLabel;
  return `
    <svg class="trend-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <path d="${path}" fill="none" style="stroke:var(--accent);stroke-width:2;" />
      ${dots}
      <text x="${coords[0][0]}" y="${h-2}" font-size="9" style="fill:var(--muted);font-family:monospace;">${firstLabel}</text>
      <text x="${coords[coords.length-1][0]}" y="${h-2}" font-size="9" text-anchor="end" style="fill:var(--muted);font-family:monospace;">${lastLabel}</text>
    </svg>`;
}

function renderTrendCharts(exerciseName){
  const el = document.getElementById('trendCharts');
  if(!exerciseName){
    el.innerHTML = '<div class="trend-empty">Log an exercise to see trends</div>';
    return;
  }
  const entries = exerciseLogs
    .filter(l => l.exercise === exerciseName)
    .slice()
    .sort((a,b)=> a.date.localeCompare(b.date) || a.created - b.created);

  const weightPoints = entries.map(l => ({
    x: l.date,
    y: Math.round((l.sets.reduce((s,x)=>s+x.weight,0) / l.sets.length) * 10) / 10
  }));
  const repsPoints = entries.map(l => ({
    x: l.date,
    y: Math.round((l.sets.reduce((s,x)=>s+x.reps,0) / l.sets.length) * 10) / 10
  }));

  el.innerHTML = `
    <div class="trend-block">
      <div class="trend-title">Average weight per session (kg)</div>
      <div class="trend-chart-wrap">${lineChartSVG(weightPoints, '')}</div>
    </div>
    <div class="trend-block">
      <div class="trend-title">Average reps per session</div>
      <div class="trend-chart-wrap">${lineChartSVG(repsPoints, '')}</div>
    </div>
  `;
}

const MEAL_TYPES = ['Breakfast','Lunch','Dinner','Snack','Drink'];
const MEAL_COLORS = {
  'Breakfast': '#E8A33D',
  'Lunch': '#2FA98A',
  'Dinner': '#2D5FA6',
  'Snack': '#C4437B',
  'Drink': '#4FA8D8'
};
const KCAL_PER_KG = 7700;

let calorieTarget = 2000;
let calorieMaintenance = 2000;
let foodLogs = [];
let burnLogs = [];
let selectedMeal = '';
let calWeekOffset = 0;

function calUid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function loadCalories(){
  try{
    const res = await fetch('/api/calories');
    if(!res.ok) throw new Error('Request failed: ' + res.status);
    const data = await res.json();
    calorieTarget = typeof data.target === 'number' ? data.target : 2000;
    calorieMaintenance = typeof data.maintenance === 'number' ? data.maintenance : calorieTarget;
    foodLogs = Array.isArray(data.food) ? data.food : [];
    burnLogs = Array.isArray(data.burn) ? data.burn : [];
  }catch(e){
    calorieTarget = 2000;
    calorieMaintenance = 2000;
    foodLogs = [];
    burnLogs = [];
    console.error('Calorie load failed:', e);
  }
  renderFoodNames();
  renderBurnTypes();
  renderCalSummary();
  renderCalTodayList();
  renderCalHistory();
  renderCalWeek();
  renderCalTrends();
}

async function saveCalories(){
  try{
    const res = await fetch('/api/calories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target: calorieTarget, maintenance: calorieMaintenance, food: foodLogs, burn: burnLogs })
    });
    if(!res.ok) throw new Error('Request failed: ' + res.status);
  }catch(e){
    console.error('Calorie save failed:', e);
  }
}

function findLastFoodFor(name){
  const norm = name.trim().toLowerCase();
  if(!norm) return null;
  const matches = foodLogs.filter(f => f.name.trim().toLowerCase() === norm);
  if(matches.length === 0) return null;
  return matches.slice().sort((a,b)=> (a.date+'\u0000'+a.created) < (b.date+'\u0000'+b.created) ? 1 : -1)[0];
}
function findLastBurnFor(type){
  const norm = type.trim().toLowerCase();
  if(!norm) return null;
  const matches = burnLogs.filter(b => b.exerciseType.trim().toLowerCase() === norm);
  if(matches.length === 0) return null;
  return matches.slice().sort((a,b)=> (a.date+'\u0000'+a.created) < (b.date+'\u0000'+b.created) ? 1 : -1)[0];
}

function computeDayTotals(dateStr){
  const consumed = foodLogs.filter(f => f.date === dateStr)
    .reduce((sum, f) => sum + (f.quantity * f.caloriesPerItem), 0);
  const burned = burnLogs.filter(b => b.date === dateStr)
    .reduce((sum, b) => sum + b.caloriesBurned, 0);
  const net = consumed - burned;
  const trueDeficit = calorieMaintenance - net;
  const targetDelta = calorieTarget - net;
  return { consumed, burned, net, target: calorieTarget, maintenance: calorieMaintenance, trueDeficit, targetDelta };
}

  if(isNaN(maintVal) || maintVal <= 0 || isNaN(targetVal) || targetVal <= 0) return;
  calorieMaintenance = maintVal;
  calorieTarget = targetVal;

  renderCalTrends();
}

function getMonday(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  d.setDate(d.getDate() + diff);
  return d;
}
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
function toISODate(d){
  return d.toISOString().slice(0,10);
}

function renderCalWeek(){
  const el = document.getElementById('calWeek');
  const refDate = addDays(new Date(todayStr() + 'T00:00:00'), calWeekOffset * 7);
  const monday = getMonday(toISODate(refDate));
  const days = Array.from({length:7}, (_, i) => toISODate(addDays(monday, i)));

  function hasData(d){
    return foodLogs.some(f=>f.date===d) || burnLogs.some(b=>b.date===d);
  }

  const rows = days.map(d => {
    if(!hasData(d)){
      return `<tr>
        <td>${fmtDate(d).slice(5)}</td>
        <td>–</td><td>–</td><td>–</td><td>–</td>
      </tr>`;
    }
    const t = computeDayTotals(d);
    const isDeficit = t.trueDeficit >= 0;
    const isOnTarget = t.targetDelta >= 0;
    return `<tr>
      <td>${fmtDate(d).slice(5)}</td>
      <td>${Math.round(t.consumed)}</td>
      <td>${Math.round(t.burned)}</td>
      <td class="${isOnTarget?'deficit-good':'surplus-bad'}">${isOnTarget?'':'+'}${Math.abs(Math.round(t.targetDelta))}</td>
      <td class="${isDeficit?'deficit-good':'surplus-bad'}">${isDeficit?'':'+'}${Math.abs(Math.round(t.trueDeficit))}</td>
    </tr>`;
  }).join('');

  const loggedDays = days.filter(hasData);
  const weekTotalTargetDelta = loggedDays.reduce((sum,d) => sum + computeDayTotals(d).targetDelta, 0);
  const weekTotalDeficit = loggedDays.reduce((sum,d) => sum + computeDayTotals(d).trueDeficit, 0);
  const weightChangeKg = weekTotalDeficit / KCAL_PER_KG;
  const isLoss = weightChangeKg >= 0;
  const isOnTargetWeek = weekTotalTargetDelta >= 0;
  const weekLabel = calWeekOffset === 0 ? 'This week' : (fmtDate(days[0]) + ' – ' + fmtDate(days[6]));

  const estimateHtml = loggedDays.length === 0
    ? `<div class="week-estimate"><div class="cal-item-sub">No days logged this week yet</div></div>`
    : `<div class="week-estimate">
        <div class="big ${isLoss?'deficit-good':'surplus-bad'}">
          ${isLoss ? 'Estimated loss' : 'Estimated gain'}: ${Math.abs(weightChangeKg).toFixed(2)} kg
        </div>
        <div class="caveat">Based on your Maintenance number, over ${loggedDays.length} logged day${loggedDays.length===1?'':'s'} this week · ${KCAL_PER_KG} kcal ≈ 1kg — a rough estimate, actual results vary by person.</div>
      </div>`;

  el.innerHTML = `
    <div class="week-nav">
      <button type="button" id="weekPrevBtn">‹ Prev</button>
      <span class="week-nav-label">${weekLabel}</span>
      <button type="button" id="weekNextBtn">Next ›</button>
    </div>
    <table class="week-table">
      <thead><tr><th>Day</th><th>Cons.</th><th>Burn</th><th>Tgt Δ</th><th>Deficit</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td>Total</td><td colspan="2"></td>
        <td class="${isOnTargetWeek?'deficit-good':'surplus-bad'}">${loggedDays.length===0?'–':(isOnTargetWeek?'':'+')+Math.abs(Math.round(weekTotalTargetDelta))}</td>
        <td class="${isLoss?'deficit-good':'surplus-bad'}">${loggedDays.length===0?'–':(isLoss?'':'+')+Math.abs(Math.round(weekTotalDeficit))}</td>
      </tr></tfoot>
    </table>
    ${estimateHtml}
  `;
  document.getElementById('weekPrevBtn').addEventListener('click', () => { calWeekOffset--; renderCalWeek(); });
  document.getElementById('weekNextBtn').addEventListener('click', () => { calWeekOffset++; renderCalWeek(); });
}

function renderCalTrends(){
  const allDates = Array.from(new Set([...foodLogs.map(f=>f.date), ...burnLogs.map(b=>b.date)])).sort();
  const targetPoints = allDates.map(d => ({ x: d, y: Math.round(computeDayTotals(d).targetDelta) }));
  const maintPoints = allDates.map(d => ({ x: d, y: Math.round(computeDayTotals(d).trueDeficit) }));
  document.getElementById('calTargetTrendWrap').innerHTML = lineChartSVG(targetPoints, '');
  document.getElementById('calMaintTrendWrap').innerHTML = lineChartSVG(maintPoints, '');
}

// --- wiring ---

document.getElementById('foodAddBtn').addEventListener('click', addFoodLog);
document.getElementById('burnAddBtn').addEventListener('click', addBurnLog);

document.getElementById('foodNameInput').addEventListener('change', (e) => {
  const match = findLastFoodFor(e.target.value);
  if(match){
    document.getElementById('foodQtyInput').value = match.quantity;
    document.getElementById('foodCalInput').value = match.caloriesPerItem;
    selectedMeal = match.mealType || '';
    renderMealChips();
  }
});
document.getElementById('burnTypeInput').addEventListener('change', (e) => {
  const match = findLastBurnFor(e.target.value);
  if(match){
    document.getElementById('burnCalInput').value = match.caloriesBurned;
  }
});

document.getElementById('mealChipRow').addEventListener('click', (e) => {
  const btn = e.target.closest('.chip');
  if(!btn) return;
  const m = btn.dataset.meal;
  selectedMeal = (selectedMeal === m) ? '' : m;
  renderMealChips();
});

document.getElementById('foodTimeInput').value = new Date().toTimeString().slice(0,5);
document.getElementById('foodDateInput').value = todayStr();
document.getElementById('burnDateInput').value = todayStr();
renderMealChips();

function switchCalSubtab(tab){
  ['today','history','week','trends'].forEach(t => {
    document.getElementById('calTab' + t.charAt(0).toUpperCase() + t.slice(1) + 'Btn').classList.toggle('active', t===tab);
    document.getElementById('cal' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = (t===tab) ? 'block' : 'none';
  });
}
document.getElementById('calTabTodayBtn').addEventListener('click', () => switchCalSubtab('today'));
document.getElementById('calTabHistoryBtn').addEventListener('click', () => switchCalSubtab('history'));
document.getElementById('calTabWeekBtn').addEventListener('click', () => switchCalSubtab('week'));
document.getElementById('calTabTrendsBtn').addEventListener('click', () => switchCalSubtab('trends'));

loadCalories();


</script>
</body>
</html>
