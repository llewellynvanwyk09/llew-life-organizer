<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llew's Life Organizer</title>
<style>
  :root{
    --bg:#F6F5F1;
    --surface:#FFFFFF;
    --ink:#1D2126;
    --muted:#6B7280;
    --border:#E7E4DC;
    --accent:#1F6F5C;
    --accent-soft:#E4F0EC;
    --overdue:#B3541E;
    --overdue-soft:#FBEEE5;
    --font-display: -apple-system, 'Segoe UI', system-ui, sans-serif;
    --font-body: -apple-system, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:32px 20px 100px;
  }
  header{
    margin-bottom:16px;
  }
  .header-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }
  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:24px;
    letter-spacing:-0.02em;
    margin:0 0 4px;
  }
  .sub{
    color:var(--muted);
    font-size:14px;
    font-family:var(--font-mono);
  }
  .toggle-btn{
    flex-shrink:0;
    width:38px;
    height:38px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--ink);
    font-size:20px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .2s ease, background .15s ease;
  }
  .toggle-btn.open{
    background:var(--ink);
    color:#fff;
    transform:rotate(45deg);
  }
  .add-row{
    display:flex;
    flex-direction:column;
    gap:10px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
    margin-bottom:24px;
    overflow:hidden;
    max-height:200px;
    opacity:1;
    transition:max-height .25s ease, opacity .2s ease, padding .25s ease, margin .25s ease;
  }
  .add-row.collapsed{
    max-height:0;
    opacity:0;
    padding-top:0;
    padding-bottom:0;
    margin-bottom:8px;
    border-width:0;
  }
  .add-row .fields{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  input[type="text"], input[type="date"]{
    font-family:var(--font-body);
    font-size:15px;
    border:1px solid var(--border);
    border-radius:9px;
    padding:10px 12px;
    background:var(--bg);
    color:var(--ink);
    outline:none;
  }
  input[type="text"]{flex:1;}
  input[type="date"]{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--muted);
    width:132px;
  }
  input[type="time"]{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--muted);
    width:100px;
  }
  input:focus{border-color:var(--accent);}
  button.add-btn{
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:9px;
    padding:10px 16px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:background .15s ease;
  }
  button.add-btn:hover{background:var(--accent);}

  .group{margin-bottom:26px;}
  .group-label{
    font-family:var(--font-mono);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .group-label.overdue{color:var(--overdue);}
  .group-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--border);
  }

  .task{
    display:flex;
    align-items:flex-start;
    gap:12px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:8px;
    transition:opacity .2s ease, transform .2s ease;
  }
  .task.done{opacity:0.5;}

  .check{
    flex-shrink:0;
    width:22px;
    height:22px;
    border-radius:7px;
    border:2px solid var(--border);
    background:var(--bg);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:1px;
    transition:border-color .15s ease, background .15s ease;
  }
  .check svg{
    width:13px;
    height:13px;
    opacity:0;
    transition:opacity .15s ease;
  }
  .task.done .check{
    background:var(--accent);
    border-color:var(--accent);
  }
  .task.done .check svg{opacity:1;}

  .task-body{flex:1;min-width:0;}
  .task-text{
    font-size:15px;
    line-height:1.4;
    word-break:break-word;
  }
  .task.done .task-text{
    text-decoration:line-through;
    text-decoration-color:var(--muted);
  }
  .task-date{
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--muted);
    margin-top:3px;
  }
  .task.overdue-item .task-date{color:var(--overdue);}

  .del{
    flex-shrink:0;
    background:none;
    border:none;
    color:var(--muted);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:2px 4px;
    border-radius:6px;
    transition:color .15s ease, background .15s ease;
  }
  .del:hover{color:var(--overdue);background:var(--overdue-soft);}

  .empty{
    text-align:center;
    color:var(--muted);
    font-family:var(--font-mono);
    font-size:13px;
    padding:40px 0;
  }
  .status{
    text-align:center;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
    margin-top:24px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-row">
      <div>
        <h1>Llew's Life Organizer</h1>
      </div>
      <button class="toggle-btn" id="toggleBtn" aria-label="Toggle add task form">+</button>
    </div>
  </header>

  <div class="add-row" id="addRow">
    <input type="text" id="taskInput" placeholder="Add a task…" />
    <div class="fields">
      <input type="date" id="dateInput" />
      <input type="time" id="timeInput" step="300" />
      <button class="add-btn" id="addBtn">Add</button>
    </div>
  </div>

  <div id="lists"></div>

</div>

<script>
let tasks = [];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

async function load(){
  try{
    const res = await fetch('/api/tasks');
    if(!res.ok) throw new Error('Request failed: ' + res.status);
    const data = await res.json();
    tasks = Array.isArray(data.tasks) ? data.tasks : [];
  }catch(e){
    tasks = [];
    console.error('Load failed:', e);
  }
  render();
}

async function save(){
  try{
    const res = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tasks })
    });
    if(!res.ok) throw new Error('Request failed: ' + res.status);
  }catch(e){
    console.error('Save failed:', e);
  }
}

function addTask(){
  const input = document.getElementById('taskInput');
  const dateInput = document.getElementById('dateInput');
  const timeInput = document.getElementById('timeInput');
  const text = input.value.trim();
  if(!text) return;
  tasks.push({
    id: uid(),
    text,
    date: dateInput.value || null,
    time: timeInput.value || null,
    done: false,
    created: Date.now()
  });
  input.value = '';
  timeInput.value = '';
  save();
  render();
}

function toggleTask(id){
  const t = tasks.find(t=>t.id===id);
  if(t){ t.done = !t.done; save(); render(); }
}

function deleteTask(id){
  tasks = tasks.filter(t=>t.id!==id);
  save();
  render();
}

function fmtDate(dateStr){
  if(!dateStr) return null;
  return dateStr.replaceAll('-', '/');
}

function fmtTime(timeStr){
  if(!timeStr) return null;
  return timeStr;
}

function render(){
  const listsEl = document.getElementById('lists');
  if(tasks.length === 0){
    listsEl.innerHTML = '<div class="empty">no tasks yet — add one above</div>';
    return;
  }

  const today = todayStr();
  const pending = tasks.filter(t=>!t.done);
  const done = tasks.filter(t=>t.done).sort((a,b)=>((a.date||'9999/99/99')+' '+(a.time||'99:99')).localeCompare((b.date||'9999/99/99')+' '+(b.time||'99:99')));

  function sortKey(t){
    return (t.date || '9999/99/99') + ' ' + (t.time || '99:99');
  }
  const overdue = pending.filter(t=>t.date && t.date < today).sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));
  const todayTasks = pending.filter(t=>t.date === today).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  const upcoming = pending.filter(t=>t.date && t.date > today).sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));
  const noDate = pending.filter(t=>!t.date).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99') || a.created-b.created);

  let html = '';

  function group(label, items, cls){
    if(items.length === 0) return '';
    let rows = items.map(t => taskRow(t)).join('');
    return `<div class="group"><div class="group-label ${cls||''}">${label}</div>${rows}</div>`;
  }

  function taskRow(t){
    const overdueFlag = t.date && t.date < today && !t.done;
    return `
      <div class="task ${t.done?'done':''} ${overdueFlag?'overdue-item':''}">
        <div class="check" onclick="toggleTask('${t.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="task-body">
          <div class="task-text">${escapeHtml(t.text)}</div>
          ${t.date ? `<div class="task-date">${fmtDate(t.date)}${t.time ? ' · ' + fmtTime(t.time) : ''}</div>` : ''}
        </div>
        <button class="del" onclick="deleteTask('${t.id}')">×</button>
      </div>`;
  }

  html += group('Overdue', overdue, 'overdue');
  html += group('Today', todayTasks);
  html += group('Upcoming', upcoming);
  html += group('No date', noDate);
  html += group('Done', done);

  listsEl.innerHTML = html;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') addTask();
});
document.getElementById('dateInput').value = todayStr();

const addRow = document.getElementById('addRow');
const toggleBtn = document.getElementById('toggleBtn');
toggleBtn.addEventListener('click', () => {
  addRow.classList.toggle('collapsed');
  const isOpen = !addRow.classList.contains('collapsed');
  toggleBtn.classList.toggle('open', isOpen);
  if(isOpen) setTimeout(() => document.getElementById('taskInput').focus(), 200);
});
// start collapsed so the task list fills the screen
addRow.classList.add('collapsed');

load();
</script>
</body>
</html>
